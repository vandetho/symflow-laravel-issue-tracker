# fly.toml — symflow-laravel-issue-tracker
# Generate an APP_KEY locally and set it as a secret before first deploy:
#   fly secrets set APP_KEY="base64:$(openssl rand -base64 32)"
# Then `fly deploy` from the project root.

app = "symflow-issue-tracker"
primary_region = "iad"

[build]

[env]
  APP_NAME = "Symflow Issues"
  APP_ENV = "production"
  APP_DEBUG = "false"
  APP_URL = "https://symflow-issue-tracker.fly.dev"
  LOG_CHANNEL = "stderr"
  LOG_LEVEL = "info"
  DB_CONNECTION = "sqlite"
  DB_DATABASE = "/data/database.sqlite"
  SESSION_DRIVER = "database"
  CACHE_STORE = "database"
  QUEUE_CONNECTION = "database"

[[mounts]]
  source = "issue_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
